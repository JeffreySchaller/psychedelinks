# Netlify configuration — Psychedelinks
# Pure static site: no build step. Publish the repo root as-is.

[build]
  publish = "."
  command = ""

# Serve clean URLs (/research instead of /research.html)
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = true

# ---- Legacy redirects (preserve old Squarespace links) ----
[[redirects]]
  from = "/resources"
  to = "/research"
  status = 301
  force = true

[[redirects]]
  from = "/contact-us"
  to = "/contact"
  status = 301
  force = true

# Squarespace product detail pattern -> shop (until real product pages exist)
[[redirects]]
  from = "/shop/p/*"
  to = "/shop"
  status = 301

# ---- Security + caching headers ----
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---- Custom 404 ----
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
